# Railway: Settings sẽ đọc file này (hoặc điền tay tương đương)
[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "npm run bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Bot dùng long-polling + HTTP health trên $PORT
# Restart policy giúp tự bật lại nếu crash